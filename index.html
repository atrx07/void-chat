<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>void.chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #101010;
      --border: #1e1e1e;
      --muted: #333;
      --text: #c8c8c8;
      --dim: #555;

      /* username colors — vivid but readable on black */
      --c1: #e06c75;
      --c2: #61afef;
      --c3: #98c379;
      --c4: #e5c07b;
      --c5: #c678dd;
      --c6: #56b6c2;
      --c7: #d19a66;
      --c8: #be5046;
      --c9: #7ca3cc;
      --c10: #a8cc8c;
    }

    html {
      height: 100%;
      height: -webkit-fill-available;
    }

    body {
      height: 100%;
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      overflow: hidden;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
    }

    /* subtle scanline grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.012) 2px,
        rgba(255,255,255,0.012) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      max-width: 720px;
      margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* header */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #fff;
    }

    header h1 span { color: var(--dim); font-weight: 400; }

    #status {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.05em;
    }

    #status.connected::before {
      content: '● ';
      color: var(--c3);
    }

    #my-name-display {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.04em;
    }

    #my-name-display strong {
      /* color set by JS */
    }

    /* messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 10px;
      padding: 4px 0;
      line-height: 1.6;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg .ts {
      color: var(--muted);
      font-size: 10px;
      flex-shrink: 0;
      margin-top: 3px;
      width: 42px;
      text-align: right;
    }

    .msg .name {
      font-weight: 500;
      flex-shrink: 0;
      width: 110px;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .msg.is-me .name::after {
      content: ' ←';
      color: var(--dim);
      font-size: 10px;
    }

    .msg .body {
      color: var(--text);
      word-break: break-word;
      flex: 1;
    }

    .msg.system {
      justify-content: center;
    }
    .msg.system .body {
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      flex: unset;
      font-style: italic;
    }

    /* divider */
    .day-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.06em;
      margin: 8px 0;
    }
    .day-divider::before, .day-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* input bar */
    #input-bar {
      display: flex;
      align-items: center;
      gap: 0;
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
      min-height: 56px;
    }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px; /* 16px prevents iOS auto-zoom */
      caret-color: #fff;
      placeholder-color: var(--dim);
      -webkit-appearance: none;
      border-radius: 0;
    }

    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      padding: 10px 16px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
      min-height: 40px;
      -webkit-tap-highlight-color: transparent;
    }

    #send-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }

    #send-btn:active { opacity: 0.6; }

    /* loading state */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>void<span>.chat</span></h1>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <span id="status">connecting…</span>
      <span id="my-name-display"></span>
    </div>
  </header>

  <div id="messages">
    <div id="loading">loading messages…</div>
  </div>

  <div id="input-bar">
    <input id="msg-input" type="text" placeholder="say something…" maxlength="500" autocomplete="off" />
    <button id="send-btn">send</button>
  </div>
</div>

<script>
  // ── username generation ──────────────────────────────────────────
  const ADJECTIVES = [
    'silent','hollow','quiet','neon','dark','pale','frozen','distant',
    'scattered','wandering','grey','electric','broken','shifting','faint',
    'ashen','empty','drifting','cold','lost','spectral','void','veiled','dim'
  ];
  const NOUNS = [
    'echo','ghost','signal','wave','node','cipher','pixel','static',
    'drift','void','shade','pulse','fragment','glitch','shadow','trace',
    'wire','noise','spark','null','orbit','phase','remnant','byte'
  ];

  const COLORS = [
    'var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)',
    'var(--c6)','var(--c7)','var(--c8)','var(--c9)','var(--c10)'
  ];

  function generateUsername() {
    const adj = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)];
    const noun = NOUNS[Math.floor(Math.random() * NOUNS.length)];
    const num = Math.floor(Math.random() * 90) + 10;
    return `${adj}_${noun}${num}`;
  }

  function colorForName(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
    return COLORS[Math.abs(h) % COLORS.length];
  }

  // ── session ──────────────────────────────────────────────────────
  const MY_NAME = generateUsername();
  const MY_COLOR = colorForName(MY_NAME);
  let lastMsgId = 0;
  let pollingTimer = null;

  document.getElementById('my-name-display').innerHTML =
    `you are <strong style="color:${MY_COLOR}">${MY_NAME}</strong>`;

  // ── DOM refs ─────────────────────────────────────────────────────
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  const statusEl   = document.getElementById('status');
  const loadingEl  = document.getElementById('loading');

  // ── helpers ──────────────────────────────────────────────────────
  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
  }

  function appendMessage(msg) {
    const div = document.createElement('div');
    const isMe = msg.username === MY_NAME;
    div.className = 'msg' + (isMe ? ' is-me' : '');

    const color = colorForName(msg.username);
    div.innerHTML = `
      <span class="ts">${formatTime(msg.created_at)}</span>
      <span class="name" style="color:${color}">${escHtml(msg.username)}</span>
      <span class="body">${escHtml(msg.message)}</span>
    `;
    messagesEl.appendChild(div);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setStatus(connected) {
    statusEl.textContent = connected ? 'connected' : 'reconnecting…';
    statusEl.className = connected ? 'connected' : '';
  }

  // ── fetch messages ───────────────────────────────────────────────
  async function fetchMessages(since = 0) {
    const res = await fetch(`/api/messages?since=${since}`);
    if (!res.ok) throw new Error('fetch failed');
    return res.json();
  }

  async function loadInitial() {
    try {
      const data = await fetchMessages(0);
      loadingEl.remove();
      if (data.messages.length === 0) {
        const sys = document.createElement('div');
        sys.className = 'msg system';
        sys.innerHTML = '<span class="body">no messages yet. say hello.</span>';
        messagesEl.appendChild(sys);
      } else {
        data.messages.forEach(m => appendMessage(m));
        lastMsgId = data.messages[data.messages.length - 1].id;
      }
      scrollToBottom();
      setStatus(true);
      startPolling();
    } catch(e) {
      loadingEl.textContent = 'connection error. retrying…';
      setTimeout(loadInitial, 3000);
    }
  }

  async function poll() {
    try {
      const data = await fetchMessages(lastMsgId);
      if (data.messages.length > 0) {
        // remove "no messages" system note if present
        const sys = messagesEl.querySelector('.msg.system');
        if (sys) sys.remove();

        const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 60;
        data.messages.forEach(m => appendMessage(m));
        lastMsgId = data.messages[data.messages.length - 1].id;
        if (atBottom) scrollToBottom();
      }
      setStatus(true);
    } catch(e) {
      setStatus(false);
    }
  }

  function startPolling() {
    pollingTimer = setInterval(poll, 2500);
  }

  // ── send ─────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    sendBtn.disabled = true;

    try {
      await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: MY_NAME, message: text })
      });
      // immediately poll so sender sees their msg fast
      await poll();
    } catch(e) {
      inputEl.value = text; // restore on fail
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  // ── mobile keyboard fix ──────────────────────────────────────────
  // When keyboard opens, scroll to bottom so input stays visible
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      scrollToBottom();
    });
  }

  // ── boot ─────────────────────────────────────────────────────────
  loadInitial();
</script>
</body>
</html>
