<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>void.chat</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#080808">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="void.chat">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #101010;
      --surface2: #161616;
      --border: #1e1e1e;
      --muted: #333;
      --text: #c8c8c8;
      --dim: #555;
      --c1: #e06c75;
      --c2: #61afef;
      --c3: #98c379;
      --c4: #e5c07b;
      --c5: #c678dd;
      --c6: #56b6c2;
      --c7: #d19a66;
      --c8: #be5046;
      --c9: #7ca3cc;
      --c10: #a8cc8c;
    }

    html { height: 100%; height: -webkit-fill-available; }

    body {
      height: 100%; height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      overflow: hidden;
      position: fixed;
      width: 100%; top: 0; left: 0;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.012) 2px,rgba(255,255,255,0.012) 4px);
      pointer-events: none; z-index: 9999;
    }

    /* SIDEBAR */
    #sidebar-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #sidebar-overlay.open { opacity: 1; pointer-events: all; }

    #sidebar {
      position: fixed; top: 0; left: 0;
      width: 300px; height: 100%;
      background: #0d0d0d;
      border-right: 1px solid #2a2a2a;
      z-index: 101;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    #sidebar.open { transform: translateX(0); }

    #sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 20px 16px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
      background: #0a0a0a;
    }
    #sidebar-header span {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 600;
      letter-spacing: 0.06em; color: #fff;
    }
    #sidebar-close {
      background: none; border: none; color: var(--dim);
      font-size: 18px; cursor: pointer; padding: 4px; line-height: 1;
    }
    #sidebar-close:hover { color: var(--text); }

    #sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
      background: #0a0a0a;
    }
    .sidebar-tab {
      flex: 1; padding: 12px 8px;
      background: none; border: none;
      color: #555; font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 0.05em;
      cursor: pointer; text-align: center;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .sidebar-tab.active { color: #e0e0e0; border-bottom-color: var(--c2); }
    .sidebar-tab:hover { color: #e0e0e0; }

    .sidebar-panel { display: none; padding: 20px; flex: 1; }
    .sidebar-panel.active { display: block; }

    .panel-title {
      font-size: 11px; letter-spacing: 0.08em;
      color: #888; text-transform: uppercase;
      margin-bottom: 16px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 10px;
      color: #666; letter-spacing: 0.05em;
      margin-bottom: 6px; text-transform: uppercase;
    }
    .field input {
      width: 100%; background: #1a1a1a;
      border: 1px solid #2a2a2a; color: #e0e0e0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px; padding: 10px 12px;
      outline: none;
      -webkit-appearance: none; border-radius: 0;
    }
    .field input:focus { border-color: var(--c2); }

    .btn {
      width: 100%; padding: 10px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #e0e0e0; font-family: 'JetBrains Mono', monospace;
      font-size: 12px; letter-spacing: 0.05em;
      cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s;
      margin-bottom: 10px;
    }
    .btn:hover { border-color: var(--c2); color: var(--c2); background: #111; }
    .btn.danger:hover { border-color: var(--c1); color: var(--c1); background: #111; }
    .btn.success:hover { border-color: var(--c3); color: var(--c3); background: #111; }

    .panel-msg {
      font-size: 11px; padding: 8px 10px;
      margin-top: 10px; border-left: 2px solid var(--dim);
      color: var(--dim);
    }
    .panel-msg.ok { border-color: var(--c3); color: var(--c3); }
    .panel-msg.err { border-color: var(--c1); color: var(--c1); }

    .divider { height: 1px; background: #2a2a2a; margin: 16px 0; }

    /* sidebar footer */
    #sidebar-footer {
      margin-top: auto;
      padding: 20px;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    #sidebar-author {
      font-size: 11px; color: #555;
      letter-spacing: 0.05em; margin-bottom: 14px;
    }
    #sidebar-author span { color: #888; }
    #sidebar-socials {
      display: flex; flex-direction: column; gap: 10px;
    }
    .social-link {
      display: flex; align-items: center; gap: 10px;
      color: #999; text-decoration: none;
      font-size: 12px; letter-spacing: 0.04em;
      padding: 8px 10px;
      border: 1px solid #222;
      background: #111;
      transition: color 0.15s, border-color 0.15s;
    }
    .social-link:hover { color: #e0e0e0; border-color: #444; }
    .social-link svg { flex-shrink: 0; opacity: 0.7; }

    #user-list { margin-top: 10px; }
    .user-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .user-row .ban-btn {
      background: none; border: 1px solid var(--border);
      color: var(--dim); font-family: 'JetBrains Mono', monospace;
      font-size: 10px; padding: 3px 8px; cursor: pointer;
    }
    .user-row .ban-btn:hover { border-color: var(--c1); color: var(--c1); }

    #logged-in-info {
      padding: 12px; background: var(--surface2);
      border: 1px solid var(--border); margin-bottom: 14px;
      font-size: 11px; color: var(--dim);
    }
    #logged-in-info strong { display: block; font-size: 13px; color: var(--text); margin-bottom: 4px; }

    #notif-toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-top: 1px solid var(--border); margin-top: 10px;
      font-size: 11px; color: var(--dim);
    }
    #notif-toggle-row span { letter-spacing: 0.04em; }
    .toggle-switch {
      position: relative; width: 36px; height: 20px; flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; background: var(--muted);
      border-radius: 20px; cursor: pointer; transition: background 0.2s;
    }
    .toggle-track::after {
      content: ""; position: absolute; left: 3px; top: 3px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #fff; transition: transform 0.2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--c2); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }

    /* MAIN APP */
    #app {
      display: flex; flex-direction: column;
      height: 100%; height: 100dvh;
      max-width: 720px; margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom);
    }

    header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #hamburger {
      background: none; border: none;
      color: var(--dim); cursor: pointer;
      padding: 4px 10px 4px 0;
      font-size: 18px; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    #hamburger:hover { color: var(--text); }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 16px; font-weight: 600;
      letter-spacing: 0.08em; color: #fff;
    }
    header h1 span { color: var(--dim); font-weight: 400; }

    .header-right {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 4px;
    }
    #status { font-size: 11px; color: var(--dim); letter-spacing: 0.05em; }
    #status.connected::before { content: '● '; color: var(--c3); }
    #my-name-display { font-size: 11px; color: var(--dim); letter-spacing: 0.04em; }

    #messages {
      flex: 1; overflow-y: auto;
      padding: 16px;
      display: flex; flex-direction: column;
      gap: 2px; scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

    .msg {
      display: flex; gap: 10px;
      padding: 4px 0; line-height: 1.6;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg .ts {
      color: var(--muted); font-size: 10px;
      flex-shrink: 0; margin-top: 3px;
      width: 38px; text-align: right;
    }
    .msg .name {
      font-weight: 500; flex-shrink: 0;
      width: 100px; text-align: right;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .msg.is-me .name::after { content: ' \2190'; color: var(--dim); font-size: 10px; }
    .msg .body { color: var(--text); word-break: break-word; flex: 1; }

    .msg.announce {
      background: rgba(229,192,123,0.06);
      border-left: 2px solid var(--c4);
      padding: 8px 10px 8px 12px;
      margin: 4px 0; border-radius: 0;
    }
    .msg.announce .body { color: var(--c4); font-size: 15px; font-weight: 500; }

    .msg .del-btn {
      display: none;
      background: none; border: none;
      color: var(--c1); font-size: 10px;
      cursor: pointer; padding: 0 4px;
      flex-shrink: 0; align-self: center;
      opacity: 0.6;
    }
    .msg .del-btn:hover { opacity: 1; }
    body.is-admin .msg:hover .del-btn { display: block; }

    .msg.system { justify-content: center; }
    .msg.system .body {
      color: var(--muted); font-size: 11px;
      text-align: center; flex: unset; font-style: italic;
    }

    #input-bar {
      display: flex; align-items: center;
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0; min-height: 56px;
    }
    #msg-input {
      flex: 1; background: transparent;
      border: none; outline: none;
      color: var(--text); font-family: 'JetBrains Mono', monospace;
      font-size: 16px; caret-color: #fff;
      -webkit-appearance: none; border-radius: 0;
    }
    #msg-input::placeholder { color: var(--muted); }
    #send-btn {
      background: none; border: 1px solid var(--border);
      color: var(--dim); font-family: 'JetBrains Mono', monospace;
      font-size: 12px; letter-spacing: 0.06em;
      padding: 10px 16px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0; min-height: 40px;
      -webkit-tap-highlight-color: transparent;
    }
    #send-btn:hover { border-color: var(--text); color: var(--text); }
    #send-btn:active { opacity: 0.6; }

    #loading {
      display: flex; align-items: center; justify-content: center;
      flex: 1; color: var(--muted); font-size: 12px; letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div id="sidebar-overlay"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <span>menu</span>
    <button id="sidebar-close">x</button>
  </div>
  <div id="sidebar-tabs">
    <button class="sidebar-tab active" data-tab="user">user</button>
    <button class="sidebar-tab" data-tab="admin">admin</button>
  </div>

  <!-- USER PANEL -->
  <div class="sidebar-panel active" id="panel-user">
    <div id="logged-in-info" style="display:none">
      <strong id="loggedin-name"></strong>
      logged in
      <div id="notif-toggle-row">
        <span>push notifications</span>
        <label class="toggle-switch">
          <input type="checkbox" id="notif-toggle" />
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <div id="form-register">
      <div class="panel-title">register username</div>
      <div class="field">
        <label>username</label>
        <input type="text" id="reg-username" placeholder="choose a username" maxlength="30" autocomplete="off" />
      </div>
      <div class="field">
        <label>password</label>
        <input type="password" id="reg-password" placeholder="choose a password" maxlength="100" />
      </div>
      <button class="btn success" id="reg-btn">register</button>
      <div class="panel-msg" id="reg-msg" style="display:none"></div>
    </div>

    <div class="divider"></div>

    <div id="form-login">
      <div class="panel-title">login</div>
      <div class="field">
        <label>username</label>
        <input type="text" id="login-username" placeholder="your username" maxlength="30" autocomplete="off" />
      </div>
      <div class="field">
        <label>password</label>
        <input type="password" id="login-password" placeholder="your password" maxlength="100" />
      </div>
      <button class="btn" id="login-btn">login</button>
      <div class="panel-msg" id="login-msg" style="display:none"></div>
    </div>

    <div id="logout-section" style="display:none">
      <div class="divider"></div>
      <button class="btn danger" id="logout-btn">logout</button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="sidebar-panel" id="panel-admin">
    <div id="admin-login-form">
      <div class="panel-title">admin login</div>
      <div class="field">
        <label>username</label>
        <input type="text" id="admin-username" placeholder="admin username" autocomplete="off" />
      </div>
      <div class="field">
        <label>password</label>
        <input type="password" id="admin-password" placeholder="admin password" />
      </div>
      <button class="btn" id="admin-login-btn">login</button>
      <div class="panel-msg" id="admin-msg" style="display:none"></div>
    </div>

    <div id="admin-controls" style="display:none">
      <div class="panel-title">admin controls</div>
      <button class="btn danger" id="clear-chat-btn">clear entire chat</button>
      <div class="panel-msg" id="admin-action-msg" style="display:none"></div>

      <div class="divider"></div>
      <div class="panel-title">announce</div>
      <div class="field">
        <input type="text" id="announce-input" placeholder="announcement text..." maxlength="300" autocomplete="off" />
      </div>
      <button class="btn" id="announce-btn">send announcement</button>

      <div class="divider"></div>
      <div class="panel-title">ban username</div>
      <div class="field">
        <input type="text" id="ban-input" placeholder="username to ban" maxlength="30" autocomplete="off" />
      </div>
      <button class="btn danger" id="ban-btn">ban user</button>

      <div class="divider"></div>
      <div class="panel-title">registered users</div>
      <button class="btn" id="load-users-btn">load users</button>
      <div id="user-list"></div>
    </div>
  </div>

  <!-- Sidebar footer -->
  <div id="sidebar-footer">
    <div id="sidebar-author">created by <span>atrx07</span></div>
    <div id="sidebar-socials">
      <a href="https://github.com/atrx07" target="_blank" rel="noopener" class="social-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub
      </a>
      <a href="https://www.instagram.com/atrx07" target="_blank" rel="noopener" class="social-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
        </svg>
        Instagram
      </a>
    </div>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:4px">
      <button id="hamburger">&#9776;</button>
      <h1>void<span>.chat</span></h1>
    </div>
    <div class="header-right">
      <span id="status">connecting...</span>
      <span id="my-name-display"></span>
    </div>
  </header>

  <div id="messages">
    <div id="loading">loading messages...</div>
  </div>

  <div id="input-bar">
    <input id="msg-input" type="text" placeholder="say something..." maxlength="500" autocomplete="off" />
    <button id="send-btn">send</button>
  </div>
</div>

<script>
  const ADJECTIVES = ['silent','hollow','quiet','neon','dark','pale','frozen','distant','scattered','wandering','grey','electric','broken','shifting','faint','ashen','empty','drifting','cold','lost','spectral','void','veiled','dim'];
  const NOUNS = ['echo','ghost','signal','wave','node','cipher','pixel','static','drift','void','shade','pulse','fragment','glitch','shadow','trace','wire','noise','spark','null','orbit','phase','remnant','byte'];
  const COLORS = ['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)','var(--c6)','var(--c7)','var(--c8)','var(--c9)','var(--c10)'];

  function generateUsername() {
    const adj = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)];
    const noun = NOUNS[Math.floor(Math.random() * NOUNS.length)];
    const num = Math.floor(Math.random() * 90) + 10;
    return adj + '_' + noun + num;
  }

  function colorForName(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
    return COLORS[Math.abs(h) % COLORS.length];
  }

  var VAPID_PUBLIC = 'BKIa4U1J5NylLtpQfemx1y3x2B1Q5RPQcJI2RvfTaHqJTHrSsDb-PP3BA_FaJqIARJ2aArC6ba48sK_DriGYGvM';

  // Safe localStorage wrapper
  function lsGet(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); } catch(e) {} }
  function lsRemove(k) { try { localStorage.removeItem(k); } catch(e) {} }

  // Persistent login
  var savedUser = lsGet('void_username');
  var savedType = lsGet('void_usertype');
  var MY_NAME = savedUser || generateUsername();
  var IS_REGISTERED = savedType === 'registered';
  var IS_ADMIN = false;
  var lastMsgId = 0;

  function updateNameDisplay() {
    var color = colorForName(MY_NAME);
    document.getElementById('my-name-display').innerHTML =
      'you are <strong style="color:' + color + '">' + MY_NAME + '</strong>';
  }
  updateNameDisplay();

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js').catch(function() {});
  }

  // Restore logged-in UI if user was previously logged in
  if (savedUser && IS_REGISTERED) {
    document.getElementById('loggedin-name').textContent = savedUser;
    document.getElementById('logged-in-info').style.display = 'block';
    document.getElementById('logout-section').style.display = 'block';
    document.getElementById('form-register').style.display = 'none';
    document.getElementById('form-login').style.display = 'none';
  }

  // Notification toggle logic
  var notifToggle = document.getElementById('notif-toggle');
  if (notifToggle) notifToggle.checked = lsGet('void_notif') === '1';

  notifToggle.addEventListener('change', async function() {
    if (!IS_REGISTERED) { notifToggle.checked = false; return; }
    if (notifToggle.checked) {
      if (!('Notification' in window) || !('PushManager' in window)) {
        alert('Push notifications not supported in this browser.');
        notifToggle.checked = false; return;
      }
      var perm = await Notification.requestPermission();
      if (perm !== 'granted') { notifToggle.checked = false; return; }
      try {
        var reg = await navigator.serviceWorker.ready;
        var sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC)
        });
        var subRes = await fetch('/api/push/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: MY_NAME, subscription: sub.toJSON() })
        });
        var subData = await subRes.json();
        if (subData.ok) {
          lsSet('void_notif', '1');
        } else {
          notifToggle.checked = false;
          alert('Failed to save subscription: ' + (subData.error || 'unknown error'));
        }
      } catch (e) {
        notifToggle.checked = false;
        alert('Notification setup failed: ' + e.message);
      }
    } else {
      try {
        var reg2 = await navigator.serviceWorker.ready;
        var sub2 = await reg2.pushManager.getSubscription();
        if (sub2) await sub2.unsubscribe();
        await fetch('/api/push/unsubscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: MY_NAME })
        });
      } catch (e) {}
      lsRemove('void_notif');
    }
  });

  function urlBase64ToUint8Array(base64String) {
    var padding = '='.repeat((4 - base64String.length % 4) % 4);
    var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    var rawData = window.atob(base64);
    var outputArray = new Uint8Array(rawData.length);
    for (var i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  const statusEl   = document.getElementById('status');
  const loadingEl  = document.getElementById('loading');
  const sidebar    = document.getElementById('sidebar');
  const overlay    = document.getElementById('sidebar-overlay');

  // sidebar
  document.getElementById('hamburger').addEventListener('click', function() {
    sidebar.classList.add('open');
    overlay.classList.add('open');
  });
  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
  }
  document.getElementById('sidebar-close').addEventListener('click', closeSidebar);
  overlay.addEventListener('click', closeSidebar);

  // tabs
  document.querySelectorAll('.sidebar-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.sidebar-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.sidebar-panel').forEach(function(p) { p.classList.remove('active'); });
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    });
  });

  function formatTime(ts) {
    var d = new Date(ts);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showPanelMsg(el, text, type) {
    el.textContent = text;
    el.className = 'panel-msg ' + type;
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 3500);
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setStatus(connected) {
    statusEl.textContent = connected ? 'connected' : 'reconnecting...';
    statusEl.className = connected ? 'connected' : '';
  }

  function appendMessage(msg) {
    var div = document.createElement('div');
    var isMe = msg.username === MY_NAME;
    var isAnnounce = msg.type === 'announce';
    div.className = 'msg' + (isMe ? ' is-me' : '') + (isAnnounce ? ' announce' : '');
    div.dataset.id = msg.id;

    var color = isAnnounce ? 'var(--c4)' : colorForName(msg.username);
    var label = isAnnounce ? 'admin' : msg.username;

    div.innerHTML =
      '<span class="ts">' + formatTime(msg.created_at) + '</span>' +
      '<span class="name" style="color:' + color + '">' + escHtml(label) + '</span>' +
      '<span class="body">' + escHtml(msg.message) + '</span>' +
      '<button class="del-btn" data-id="' + msg.id + '">x</button>';

    div.querySelector('.del-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      adminDeleteMessage(msg.id);
    });

    messagesEl.appendChild(div);
  }

  async function fetchMessages(since) {
    var res = await fetch('/api/messages?since=' + (since || 0));
    if (!res.ok) throw new Error('fetch failed');
    return res.json();
  }

  async function loadInitial() {
    try {
      var data = await fetchMessages(0);
      loadingEl.remove();
      if (data.messages.length === 0) {
        var sys = document.createElement('div');
        sys.className = 'msg system';
        sys.innerHTML = '<span class="body">no messages yet. say hello.</span>';
        messagesEl.appendChild(sys);
      } else {
        data.messages.forEach(function(m) { appendMessage(m); });
        lastMsgId = data.messages[data.messages.length - 1].id;
      }
      scrollToBottom();
      setStatus(true);
      setInterval(poll, 2500);
    } catch(e) {
      loadingEl.textContent = 'connection error. retrying...';
      setTimeout(loadInitial, 3000);
    }
  }

  async function poll() {
    try {
      var data = await fetchMessages(lastMsgId);
      if (data.messages.length > 0) {
        var sys = messagesEl.querySelector('.msg.system');
        if (sys) sys.remove();
        var atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 60;
        data.messages.forEach(function(m) { appendMessage(m); });
        lastMsgId = data.messages[data.messages.length - 1].id;
        if (atBottom) scrollToBottom();
      }
      setStatus(true);
    } catch(e) { setStatus(false); }
  }

  async function sendMessage() {
    var text = inputEl.value.trim();
    if (!text) return;

    if (IS_ADMIN && text.indexOf('/announce ') === 0) {
      var announcement = text.slice(10).trim();
      if (!announcement) return;
      inputEl.value = '';
      await fetch('/api/announce', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: announcement, adminToken: window._adminToken })
      });
      await poll();
      return;
    }

    inputEl.value = '';
    sendBtn.disabled = true;
    try {
      await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: MY_NAME, message: text })
      });
      await poll();
    } catch(e) { inputEl.value = text; }
    finally { sendBtn.disabled = false; inputEl.focus(); }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMessage(); });

  // USER: register
  document.getElementById('reg-btn').addEventListener('click', async function() {
    var username = document.getElementById('reg-username').value.trim();
    var password = document.getElementById('reg-password').value;
    var msgEl = document.getElementById('reg-msg');
    if (!username || !password) return showPanelMsg(msgEl, 'fill in all fields', 'err');
    var res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    });
    var data = await res.json();
    if (data.ok) {
      MY_NAME = username;
      IS_REGISTERED = true;
      lsSet('void_username', username);
      lsSet('void_usertype', 'registered');
      updateNameDisplay();
      showPanelMsg(msgEl, 'registered & logged in!', 'ok');
      showLoggedIn(username);
    } else {
      showPanelMsg(msgEl, data.error || 'error', 'err');
    }
  });

  // USER: login
  document.getElementById('login-btn').addEventListener('click', async function() {
    var username = document.getElementById('login-username').value.trim();
    var password = document.getElementById('login-password').value;
    var msgEl = document.getElementById('login-msg');
    if (!username || !password) return showPanelMsg(msgEl, 'fill in all fields', 'err');
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    });
    var data = await res.json();
    if (data.ok) {
      MY_NAME = username;
      IS_REGISTERED = true;
      lsSet('void_username', username);
      lsSet('void_usertype', 'registered');
      updateNameDisplay();
      showPanelMsg(msgEl, 'logged in!', 'ok');
      showLoggedIn(username);
    } else {
      showPanelMsg(msgEl, data.error || 'wrong credentials', 'err');
    }
  });

  function showLoggedIn(username) {
    document.getElementById('loggedin-name').textContent = username;
    document.getElementById('logged-in-info').style.display = 'block';
    document.getElementById('logout-section').style.display = 'block';
    document.getElementById('form-register').style.display = 'none';
    document.getElementById('form-login').style.display = 'none';
  }

  document.getElementById('logout-btn').addEventListener('click', async function() {
    // Unsubscribe push if active
    if (lsGet('void_notif') === '1') {
      try {
        var reg = await navigator.serviceWorker.ready;
        var sub = await reg.pushManager.getSubscription();
        if (sub) await sub.unsubscribe();
        await fetch('/api/push/unsubscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: MY_NAME })
        });
      } catch (e) {}
    }
    lsRemove('void_username');
    lsRemove('void_usertype');
    lsRemove('void_notif');
    IS_REGISTERED = false;
    MY_NAME = generateUsername();
    updateNameDisplay();
    document.getElementById('notif-toggle').checked = false;
    document.getElementById('logged-in-info').style.display = 'none';
    document.getElementById('logout-section').style.display = 'none';
    document.getElementById('form-register').style.display = 'block';
    document.getElementById('form-login').style.display = 'block';
  });

  // ADMIN: login
  document.getElementById('admin-login-btn').addEventListener('click', async function() {
    var username = document.getElementById('admin-username').value.trim();
    var password = document.getElementById('admin-password').value;
    var msgEl = document.getElementById('admin-msg');
    var res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    });
    var data = await res.json();
    if (data.ok) {
      IS_ADMIN = true;
      window._adminToken = data.token;
      document.body.classList.add('is-admin');
      document.getElementById('admin-login-form').style.display = 'none';
      document.getElementById('admin-controls').style.display = 'block';
      MY_NAME = username;
      updateNameDisplay();
    } else {
      showPanelMsg(msgEl, data.error || 'invalid credentials', 'err');
    }
  });

  // ADMIN: clear chat
  document.getElementById('clear-chat-btn').addEventListener('click', async function() {
    if (!confirm('Clear entire chat? This cannot be undone.')) return;
    var res = await fetch('/api/admin/clear', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: window._adminToken })
    });
    var data = await res.json();
    var msgEl = document.getElementById('admin-action-msg');
    if (data.ok) {
      messagesEl.innerHTML = '';
      var sys = document.createElement('div');
      sys.className = 'msg system';
      sys.innerHTML = '<span class="body">chat cleared by admin.</span>';
      messagesEl.appendChild(sys);
      lastMsgId = 0;
      showPanelMsg(msgEl, 'chat cleared', 'ok');
    } else {
      showPanelMsg(msgEl, data.error || 'error', 'err');
    }
  });

  // ADMIN: announce button
  document.getElementById('announce-btn').addEventListener('click', async function() {
    var message = document.getElementById('announce-input').value.trim();
    var msgEl = document.getElementById('admin-action-msg');
    if (!message) return showPanelMsg(msgEl, 'enter announcement text', 'err');
    var res = await fetch('/api/announce', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: message, adminToken: window._adminToken })
    });
    var data = await res.json();
    if (data.ok) {
      document.getElementById('announce-input').value = '';
      showPanelMsg(msgEl, 'announced!', 'ok');
      await poll();
    } else {
      showPanelMsg(msgEl, data.error || 'error', 'err');
    }
  });

  // ADMIN: ban
  document.getElementById('ban-btn').addEventListener('click', async function() {
    var username = document.getElementById('ban-input').value.trim();
    var msgEl = document.getElementById('admin-action-msg');
    if (!username) return showPanelMsg(msgEl, 'enter a username', 'err');
    var res = await fetch('/api/admin/ban', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, token: window._adminToken })
    });
    var data = await res.json();
    if (data.ok) {
      document.getElementById('ban-input').value = '';
      showPanelMsg(msgEl, username + ' banned', 'ok');
    } else {
      showPanelMsg(msgEl, data.error || 'error', 'err');
    }
  });

  // ADMIN: load users
  document.getElementById('load-users-btn').addEventListener('click', async function() {
    var res = await fetch('/api/admin/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: window._adminToken })
    });
    var data = await res.json();
    var list = document.getElementById('user-list');
    list.innerHTML = '';
    if (data.users && data.users.length > 0) {
      data.users.forEach(function(u) {
        var row = document.createElement('div');
        row.className = 'user-row';
        row.innerHTML =
          '<span style="color:' + colorForName(u.username) + '">' + escHtml(u.username) + '</span>' +
          '<button class="ban-btn" data-user="' + escHtml(u.username) + '">ban</button>';
        row.querySelector('.ban-btn').addEventListener('click', async function(e) {
          var uname = e.target.dataset.user;
          await fetch('/api/admin/ban', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: uname, token: window._adminToken })
          });
          row.remove();
        });
        list.appendChild(row);
      });
    } else {
      list.innerHTML = '<div style="color:var(--dim);font-size:11px;padding:8px 0">no registered users</div>';
    }
  });

  // ADMIN: delete message
  async function adminDeleteMessage(id) {
    var res = await fetch('/api/admin/delete-message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id, token: window._adminToken })
    });
    var data = await res.json();
    if (data.ok) {
      var el = messagesEl.querySelector('.msg[data-id="' + id + '"]');
      if (el) el.remove();
    }
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', function() { scrollToBottom(); });
  }

  loadInitial();
</script>
</body>
</html>
